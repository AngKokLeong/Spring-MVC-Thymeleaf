<!DOCTYPE html>


<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>BookShelf - All Books</title>
    </head>

    <body>
        <h1>All Books</h1>

        <a th:href="@{/}">Back to Home</a>

        <p th:if="${#lists.isEmpty(books)}">
            No books in the library yet.
        </p>

        <table th:unless="${#lists.isEmpty(books)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Year</th>
                    <th>Genre</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="book : ${books}">

                    <td th:text="${book.id}">1</td>
                    <td th:text="${book.title}">Title</td>
                    <td th:text="${book.author}">Author</td>
                    <td th:text="${book.year}">2024</td>
                    <td th:text="${book.genre}">Genre</td>

                    <td>
                        <a th:href="@{/books/{id} (id=${book.id})}">View Details</a>
                    </td>

                </tr>
            </tbody>
        </table>

        <br />
        <a th:href="@{/books/add}">Add New Book</a>

    </body>



</html>
